package morpho

import (
	"bytes"
	"encoding/hex"
	"encoding/json"
	"fmt"
	"io"
	"net/http"

	"github.com/Stupnikjs/morpholiq/utils"
	"github.com/ethereum/go-ethereum/common"
)

type GraphQLRequest struct {
	Query string `json:"query"`
}
type NewGraphQlResult struct {
	Data struct {
		MarketPositions struct {
			Items []struct {
				User struct {
					Address string `json:"address"`
				} `json:"user"`
				State struct {
					BorrowShares        json.Number `json:"borrowShares"`
					BorrowAssets        json.Number `json:"borrowAssets"`
					BorrowAssetsUsd     json.Number `json:"borrowAssetsUsd"`
					Collateral          json.Number `json:"collateral"`
					CollateralAssetsUsd json.Number `json:"collateralUsd"`
				} `json:"state"`
				Market struct {
					LLTV json.Number `json:"lltv"`
				} `json:"market"`
			} `json:"items"`
			PageInfo struct {
				CountTotal int `json:"countTotal"`
				Count      int `json:"count"`
				Limit      int `json:"limit"`
				Skip       int `json:"skip"`
			} `json:"pageInfo"`
		} `json:"marketPositions"`
	} `json:"data"`
}
type GraphQlResult struct {
	Data struct {
		MarketPositions struct {
			Items []struct {
				User struct {
					Address string `json:"address"`
				} `json:"user"`
				State struct {
					BorrowShares        json.Number `json:"borrowShares"`
					BorrowAssets        json.Number `json:"borrowAssets"`
					BorrowAssetsUsd     json.Number `json:"borrowAssetsUsd"`
					Collateral          json.Number `json:"collateral"`
					CollateralAssetsUsd json.Number `json:"collateralUsd"`
				} `json:"state"`
				Market struct {
					LLTV json.Number `json:"lltv"`
				} `json:"market"`
			} `json:"items"`
		} `json:"marketPositions"`
	} `json:"data"`
}

type Markets struct {
	UniqueKey     string `json:"uniqueKey"`
	LLTV          string `json:"lltv"`
	IrmAddress    string `json:"irmAddress"`
	OracleAddress string `json:"oracleAddress"`
	LoanAsset     struct {
		Address  string `json:"address"`
		Symbol   string `json:"symbol"`
		Decimals int    `json:"decimals"`
	} `json:"loanAsset"`
	CollateralAsset struct {
		Address  string `json:"address"`
		Symbol   string `json:"symbol"`
		Decimals int    `json:"decimals"`
	} `json:"collateralAsset"`
}

type Response struct {
	Data struct {
		Markets struct {
			Items []Markets `json:"items"`
		} `json:"markets"`
	} `json:"data"`
}

func ApiRespToBorrowPos(params MorphoMarketParams, result NewGraphQlResult) []BorrowPosition {
	items := result.Data.MarketPositions.Items
	positions := []BorrowPosition{}
	for _, i := range items {
		p := BorrowPosition{
			MarketID:         [32]byte(params.ID),
			Address:          common.HexToAddress(i.User.Address),
			BorrowShares:     utils.ParseBigInt(i.State.BorrowShares.String()),
			CollateralAssets: utils.ParseBigInt(i.State.Collateral.String()),
		}

		positions = append(positions, p)
	}
	return positions
}

func FecthBorrowersFromMarket(param MorphoMarketParams, n int) ([]BorrowPosition, error) {
	marketIDstr := "0x" + hex.EncodeToString(param.ID[:])

	query := fmt.Sprintf(`{ marketPositions(first: 1000, where: { marketUniqueKey_in: ["%s"], chainId_in: [%d] }) { items  { user { address }  state { borrowShares borrowAssets borrowAssetsUsd collateral collateralUsd }  market { lltv }} } }`, marketIDstr, uint(param.ChainID))
	body, _ := json.Marshal(GraphQLRequest{Query: query})
	resp, err := http.Post(
		"https://api.morpho.org/graphql",
		"application/json",
		bytes.NewBuffer(body),
	)
	if err != nil {
		return nil, err
	}

	defer resp.Body.Close()

	var result NewGraphQlResult

	if err := json.NewDecoder(resp.Body).Decode(&result); err != nil {
		return nil, err
	}

	return ApiRespToBorrowPos(param, result), nil

}

func NewFecthBorrowersFromMarket(param MorphoMarketParams) ([]BorrowPosition, error) {
	marketIDstr := "0x" + hex.EncodeToString(param.ID[:])
	allPositions := []BorrowPosition{}
	skip := 0
	limit := 500

	for {
		query := fmt.Sprintf(`{
            marketPositions(
                first: %d
                skip: %d
                where: {
                    marketUniqueKey_in: ["%s"]
                    chainId_in: [%d]
                }
            ) {
                items {
                    user { address }
                    state { borrowShares borrowAssets borrowAssetsUsd collateral collateralUsd }
                    market { lltv }
                }
                pageInfo { countTotal count limit skip }
            }
        }`, limit, skip, marketIDstr, uint(param.ChainID))

		body, _ := json.Marshal(GraphQLRequest{Query: query})
		resp, err := http.Post(
			"https://api.morpho.org/graphql",
			"application/json",
			bytes.NewBuffer(body),
		)
		if err != nil {
			return nil, err
		}

		data, _ := io.ReadAll(resp.Body)
		resp.Body.Close()

		var result NewGraphQlResult
		if err := json.Unmarshal(data, &result); err != nil {
			return nil, err
		}

		allPositions = append(allPositions, ApiRespToBorrowPos(param, result)...)

		pageInfo := result.Data.MarketPositions.PageInfo

		if skip+limit >= pageInfo.CountTotal {
			break
		}
		skip += limit
	}

	return allPositions, nil
}
